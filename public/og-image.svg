<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#04040f"/>
      <stop offset="50%"  stop-color="#080818"/>
      <stop offset="100%" stop-color="#05050f"/>
    </linearGradient>

    <!-- Headline gradient blue→purple→pink -->
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>

    <!-- Top/bottom border gradient -->
    <linearGradient id="ln" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#3b82f6"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="80%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>

    <!-- Ambient glow radials -->
    <radialGradient id="gl1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gl2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gl3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle grid -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.7"/>
    </pattern>

    <!-- Text glow filter -->
    <filter id="tg" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow filter -->
    <filter id="sg" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to canvas -->
    <clipPath id="canvas">
      <rect width="1200" height="630"/>
    </clipPath>

  </defs>

  <g clip-path="url(#canvas)">

    <!-- ═══════════════════════════════════════
         BACKGROUND
    ═══════════════════════════════════════ -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#grid)"/>

    <!-- Ambient glow orbs -->
    <ellipse cx="160"  cy="180"  rx="440" ry="320" fill="url(#gl1)" opacity="0.85"/>
    <ellipse cx="1080" cy="460"  rx="380" ry="300" fill="url(#gl2)" opacity="0.85"/>
    <ellipse cx="600"  cy="630"  rx="500" ry="200" fill="url(#gl3)" opacity="0.55"/>

    <!-- Top accent bar -->
    <rect x="0" y="0" width="1200" height="5" fill="url(#ln)"/>
    <!-- Bottom accent bar -->
    <rect x="0" y="625" width="1200" height="5" fill="url(#ln)" opacity="0.6"/>

    <!-- Corner brackets -->
    <polyline points="52,16 52,60 96,60"    fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
    <polyline points="1148,16 1148,60 1104,60" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
    <polyline points="52,614 52,570 96,570"   fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
    <polyline points="1148,614 1148,570 1104,570" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>

    <!-- ═══════════════════════════════════════
         HEADER  y: 28–70
    ═══════════════════════════════════════ -->

    <!-- Logo nodes -->
    <circle cx="72"  cy="46" r="7"  fill="#3b82f6" filter="url(#sg)"/>
    <circle cx="90"  cy="34" r="4.5" fill="#8b5cf6" filter="url(#sg)"/>
    <circle cx="90"  cy="58" r="4.5" fill="#06b6d4" filter="url(#sg)"/>
    <line x1="79" y1="43" x2="86" y2="37" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="79" y1="49" x2="86" y2="55" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="90" y1="39" x2="90" y2="53" stroke="#22d3ee" stroke-width="1"   stroke-opacity="0.5"/>

    <!-- Brand -->
    <text x="106" y="55" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="6">ACLLC</text>

    <!-- Dot separator -->
    <circle cx="218" cy="46" r="2.2" fill="#334155"/>

    <!-- Sub-brand -->
    <text x="230" y="51" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11.5" font-weight="500" fill="#64748b" letter-spacing="0.5">AI Product Engineer</text>

    <!-- Available badge -->
    <rect x="880" y="28" width="268" height="38" rx="19" fill="rgba(34,197,94,0.07)" stroke="#22c55e" stroke-width="1.2" stroke-opacity="0.4"/>
    <circle cx="904" cy="47" r="6"  fill="#22c55e" opacity="0.2">
      <animate attributeName="r"       values="6;13;6"   dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="904" cy="47" r="5.5" fill="#22c55e"/>
    <text x="920" y="52" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="700" fill="#34d399" letter-spacing="2">AVAILABLE FOR PROJECTS</text>

    <!-- Header divider -->
    <line x1="52" y1="80" x2="1148" y2="80" stroke="white" stroke-opacity="0.06" stroke-width="1"/>


    <!-- ═══════════════════════════════════════
         MAIN HEADLINE  y: 115–300
         "I build intelligent applications."
         Large, centred, maximum impact
    ═══════════════════════════════════════ -->

    <!-- Line 1 -->
    <text x="600" y="180"
      font-family="'Inter','Helvetica Neue',Arial,sans-serif"
      font-size="82" font-weight="900" letter-spacing="-3"
      text-anchor="middle" filter="url(#tg)">
      <tspan fill="white">I build </tspan><tspan fill="url(#hg)">intelligent</tspan>
    </text>

    <!-- Line 2 -->
    <text x="600" y="272"
      font-family="'Inter','Helvetica Neue',Arial,sans-serif"
      font-size="82" font-weight="900" letter-spacing="-3"
      fill="white" text-anchor="middle">applications.
    </text>

    <!-- Gradient underline -->
    <rect x="300" y="285" width="600" height="4" rx="2" fill="url(#hg)" opacity="0.65"/>

    <!-- ═══════════════════════════════════════
         SUBTITLE  y: 325
    ═══════════════════════════════════════ -->
    <text x="600" y="335"
      font-family="'Inter','Helvetica Neue',Arial,sans-serif"
      font-size="19" font-weight="400" fill="#94a3b8" letter-spacing="0.2"
      text-anchor="middle">
      SaaS platforms, Mobile AI apps &amp; AI Agents — built end-to-end.
    </text>
    <text x="600" y="364"
      font-family="'Inter','Helvetica Neue',Arial,sans-serif"
      font-size="19" font-weight="400" fill="#64748b" letter-spacing="0.2"
      text-anchor="middle">
      From concept to deployed product.
    </text>


    <!-- ═══════════════════════════════════════
         3 SERVICE BADGES  y: 405–460
    ═══════════════════════════════════════ -->

    <!-- Badge 1 — SaaS Development (blue) — centred trio -->
    <!-- x positions: left=152, mid=490, right=828  width=310 each, gap=26 -->

    <!-- Card 1 -->
    <rect x="152" y="405" width="290" height="62" rx="14"
          fill="rgba(59,130,246,0.10)" stroke="#3b82f6" stroke-width="1.4" stroke-opacity="0.5"/>
    <rect x="152" y="405" width="290" height="4" rx="2" fill="#3b82f6" opacity="0.7"/>
    <text x="167" y="443" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" text-anchor="start">🏗️</text>
    <text x="207" y="431" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="800" fill="white">SaaS Development</text>
    <text x="207" y="454" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#3b82f6" letter-spacing="1.5">DASHBOARDS · STRIPE · FIREBASE · VERCEL</text>

    <!-- Card 2 -->
    <rect x="460" y="405" width="280" height="62" rx="14"
          fill="rgba(139,92,246,0.10)" stroke="#8b5cf6" stroke-width="1.4" stroke-opacity="0.5"/>
    <rect x="460" y="405" width="280" height="4" rx="2" fill="#8b5cf6" opacity="0.7"/>
    <text x="475" y="443" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" text-anchor="start">📱</text>
    <text x="515" y="431" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="800" fill="white">Mobile AI App</text>
    <text x="515" y="454" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#a78bfa" letter-spacing="1.5">REACT NATIVE · ON-DEVICE AI · IOS &amp; ANDROID</text>

    <!-- Card 3 -->
    <rect x="758" y="405" width="290" height="62" rx="14"
          fill="rgba(6,182,212,0.10)" stroke="#06b6d4" stroke-width="1.4" stroke-opacity="0.5"/>
    <rect x="758" y="405" width="290" height="4" rx="2" fill="#06b6d4" opacity="0.7"/>
    <text x="773" y="443" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" text-anchor="start">🤖</text>
    <text x="813" y="431" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="800" fill="white">AI Agent</text>
    <text x="813" y="454" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#22d3ee" letter-spacing="1.5">LANGCHAIN · LANGGRAPH · OPENAI · ANTHROPIC</text>


    <!-- ═══════════════════════════════════════
         TECH STACK PILLS  y: 497–526
    ═══════════════════════════════════════ -->

    <!-- Divider -->
    <line x1="52" y1="490" x2="1148" y2="490" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

    <!-- "STACK" label -->
    <text x="600" y="513" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="700" fill="#334155" letter-spacing="4" text-anchor="middle">TECH STACK</text>

    <!-- Pills — 7 pills centred, each ~112px wide, 8px gap -->
    <!-- Total: 7×112 + 6×10 = 784+60 = 844 → start x = (1200-844)/2 = 178 -->

    <!-- Firebase -->
    <rect x="178" y="522" width="104" height="26" rx="6" fill="rgba(251,191,36,0.10)" stroke="#fbbf24" stroke-width="0.9" stroke-opacity="0.45"/>
    <text x="230" y="540" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">Firebase</text>

    <!-- Stripe -->
    <rect x="292" y="522" width="96"  height="26" rx="6" fill="rgba(139,92,246,0.10)" stroke="#8b5cf6" stroke-width="0.9" stroke-opacity="0.45"/>
    <text x="340" y="540" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="600" fill="#c084fc" text-anchor="middle">Stripe</text>

    <!-- Vercel -->
    <rect x="398" y="522" width="94"  height="26" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="0.9"/>
    <text x="445" y="540" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="600" fill="#e2e8f0" text-anchor="middle">Vercel</text>

    <!-- LangChain -->
    <rect x="502" y="522" width="104" height="26" rx="6" fill="rgba(59,130,246,0.10)" stroke="#3b82f6" stroke-width="0.9" stroke-opacity="0.45"/>
    <text x="554" y="540" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="600" fill="#60a5fa" text-anchor="middle">LangChain</text>

    <!-- OpenAI -->
    <rect x="616" y="522" width="88"  height="26" rx="6" fill="rgba(52,211,153,0.10)" stroke="#34d399" stroke-width="0.9" stroke-opacity="0.45"/>
    <text x="660" y="540" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">OpenAI</text>

    <!-- Anthropic -->
    <rect x="714" y="522" width="100" height="26" rx="6" fill="rgba(167,139,250,0.10)" stroke="#a78bfa" stroke-width="0.9" stroke-opacity="0.45"/>
    <text x="764" y="540" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">Anthropic</text>

    <!-- Next.js -->
    <rect x="824" y="522" width="88"  height="26" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="0.9"/>
    <text x="868" y="540" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="600" fill="#e2e8f0" text-anchor="middle">Next.js</text>


    <!-- ═══════════════════════════════════════
         BOTTOM CTA ROW  y: 570–610
    ═══════════════════════════════════════ -->

    <!-- WhatsApp CTA button centred -->
    <rect x="350" y="565" width="500" height="46" rx="13"
          fill="rgba(139,92,246,0.14)" stroke="#8b5cf6" stroke-width="1.4" stroke-opacity="0.55"/>
    <circle cx="385" cy="588" r="12" fill="rgba(34,197,94,0.18)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
    <text x="385" y="593" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="13" text-anchor="middle">💬</text>
    <text x="600" y="595" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">DM on WhatsApp  →  +212 638-426738</text>

  </g>
</svg>
