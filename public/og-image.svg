      <text x="140" y="16" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#60a5fa" text-anchor="middle">LangGraph</text>

      <rect x="192" y="0" width="72" height="24" rx="5" fill="rgba(167,139,250,0.1)" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.35"/>
      <text x="228" y="16" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#a78bfa" text-anchor="middle">OpenAI</text>

