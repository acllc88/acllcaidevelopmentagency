      <text x="623" y="16" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#e2e8f0" text-anchor="middle">Vercel</text>

      <rect x="662" y="0" width="86" height="24" rx="5" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.35"/>
      <text x="705" y="16" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#22d3ee" text-anchor="middle">Vector DBs</text>

