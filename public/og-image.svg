    <circle cx="13" cy="3" r="3.5" fill="#8b5cf6" filter="url(#glowFilter)"/>
    <circle cx="13" cy="17" r="3.5" fill="#06b6d4" filter="url(#glowFilter)"/>
    <line x1="5" y1="8" x2="10" y2="4" stroke="#60a5fa" stroke-width="1.2" opacity="0.6"/>
    <line x1="5" y1="12" x2="10" y2="16" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"/>
