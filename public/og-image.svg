<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060611;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0d1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0618;stop-opacity:1" />
    </linearGradient>

    <!-- Main headline gradient -->
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa" />
      <stop offset="45%" style="stop-color:#a78bfa" />
      <stop offset="100%" style="stop-color:#f0abfc" />
    </linearGradient>

    <!-- Green gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399" />
      <stop offset="100%" style="stop-color:#22d3ee" />
    </linearGradient>

    <!-- SaaS card gradient -->
    <linearGradient id="saasGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f3d;stop-opacity:1" />
    </linearGradient>

    <!-- Mobile card gradient -->
    <linearGradient id="mobileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1f6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f38;stop-opacity:1" />
    </linearGradient>

    <!-- Agent card gradient -->
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#061f1f;stop-opacity:1" />
    </linearGradient>

    <!-- Glow orbs -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </radialGradient>

    <!-- Badge gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.12" />
    </linearGradient>

    <!-- Top line gradient -->
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#3b82f6" />
      <stop offset="50%" style="stop-color:#8b5cf6" />
      <stop offset="80%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </linearGradient>

    <!-- Card border gradients -->
    <linearGradient id="saasBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="mobileBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="agentBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.2" />
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.05)"/>
    </pattern>

    <!-- Drop shadow for cards -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Glow filter -->
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.8"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Ambient glows -->
  <ellipse cx="150" cy="80" rx="320" ry="240" fill="url(#glow1)" opacity="0.8"/>
  <ellipse cx="1050" cy="550" rx="300" ry="250" fill="url(#glow2)" opacity="0.8"/>
  <ellipse cx="600" cy="320" rx="350" ry="200" fill="url(#glow3)" opacity="0.4"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#topLine)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#topLine)" opacity="0.7"/>

  <!-- ═══ CORNER MARKS ═══ -->
  <line x1="50" y1="30" x2="50" y2="65" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="30" x2="85" y2="30" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <line x1="1150" y1="30" x2="1150" y2="65" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="1115" y1="30" x2="1150" y2="30" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="600" x2="50" y2="565" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="600" x2="85" y2="600" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <line x1="1150" y1="600" x2="1150" y2="565" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="1115" y1="600" x2="1150" y2="600" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>

