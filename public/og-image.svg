    <text x="20" y="170" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a78bfa">From $3,000</text>
    <text x="200" y="170" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#475569">2–8 weeks delivery</text>
