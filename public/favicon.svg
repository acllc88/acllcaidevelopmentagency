<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>

    <!-- Primary brand gradient (blue to purple) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Glow gradient for the neural icon -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>

    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Neural node glow filter -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#8b5cf6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="url(#borderGrad)" stroke-width="2"/>

  <!-- Background glow -->
  <circle cx="256" cy="200" r="180" fill="url(#glow)" opacity="0.5"/>

  <!-- Neural network nodes and connections (top section - abstract brain) -->
  <!-- Connection lines -->
  <g stroke="url(#brandGrad)" stroke-width="1.5" opacity="0.3">
    <line x1="180" y1="120" x2="256" y2="160"/>
    <line x1="332" y1="120" x2="256" y2="160"/>
    <line x1="256" y1="160" x2="200" y2="220"/>
    <line x1="256" y1="160" x2="312" y2="220"/>
    <line x1="200" y1="220" x2="256" y2="260"/>
    <line x1="312" y1="220" x2="256" y2="260"/>
    <line x1="180" y1="120" x2="140" y2="180"/>
    <line x1="332" y1="120" x2="372" y2="180"/>
    <line x1="140" y1="180" x2="200" y2="220"/>
    <line x1="372" y1="180" x2="312" y2="220"/>
  </g>

  <!-- Neural nodes -->
  <g filter="url(#nodeGlow)">
    <!-- Top layer -->
    <circle cx="180" cy="120" r="6" fill="#3b82f6"/>
    <circle cx="256" cy="100" r="4" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="332" cy="120" r="6" fill="#06b6d4"/>

    <!-- Middle layer -->
    <circle cx="140" cy="180" r="5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="256" cy="160" r="8" fill="#8b5cf6"/>
    <circle cx="372" cy="180" r="5" fill="#06b6d4" opacity="0.7"/>

    <!-- Lower layer -->
    <circle cx="200" cy="220" r="5" fill="#3b82f6" opacity="0.8"/>
    <circle cx="312" cy="220" r="5" fill="#06b6d4" opacity="0.8"/>

    <!-- Center convergence -->
    <circle cx="256" cy="260" r="7" fill="#8b5cf6"/>
  </g>

  <!-- Accent line under neural network -->
  <line x1="140" y1="285" x2="372" y2="285" stroke="url(#accentLine)" stroke-width="1.5"/>

  <!-- "AC" lettermark -->
  <g filter="url(#softShadow)">
    <!-- Letter A -->
    <path d="M130 420 L185 310 L240 420" fill="none" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="148" y1="385" x2="222" y2="385" stroke="url(#brandGrad)" stroke-width="10" stroke-linecap="round"/>

    <!-- Letter C -->
    <path d="M340 315 C295 305, 270 335, 270 365 C270 395, 295 425, 340 420" fill="none" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Small "LLC" text -->
  <text x="370" y="420" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" fill="#94a3b8" letter-spacing="3">LLC</text>

  <!-- Bottom accent dots -->
  <g opacity="0.4">
    <circle cx="216" cy="460" r="3" fill="#3b82f6"/>
    <circle cx="256" cy="460" r="3" fill="#8b5cf6"/>
    <circle cx="296" cy="460" r="3" fill="#06b6d4"/>
  </g>
</svg>